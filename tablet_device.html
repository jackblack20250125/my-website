<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>學校平板管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <style>
    :root {
      --primary: #6C5CE7;
      --primary-hover: #5A48D1;
      --secondary: #00B894;
      --danger: #D63031;
      --bg: #F3F4F6;
      --card-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
    }
    body { 
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      padding-bottom: 120px; 
      font-family: 'Inter', 'Noto Sans TC', sans-serif; 
      min-height: 100vh;
      color: #1F2937;
    }
    
    /* 玻璃擬態背景裝飾 */
    .bg-shape1 { position: fixed; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(108, 92, 231,0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: -1; }
    .bg-shape2 { position: fixed; bottom: -150px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 184, 148,0.12) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: -1; }

    .container { max-width: 960px; position: relative; z-index: 10; padding-top: 45px; }

    /* --- 頂部排版 --- */
    .header-section { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease; }
    h2 { font-weight: 800; color: #111827; margin-bottom: 8px; letter-spacing: -1px; font-size: 2.3rem; }
    .sub-title { color: #6B7280; font-size: 1.05rem; }

    /* --- 按鈕群 --- */
    .btn-group-custom {
      display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap;
    }

    .btn-glass {
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); color: #4B5563;
      padding: 10px 24px; font-size: 15px; font-weight: 600;
      border-radius: 50px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.04);
    }
    .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(0,0,0,0.08); background: #fff; color: var(--primary); }
    .btn-glass:active { transform: scale(0.96); }
    .btn-glass.active { background: var(--primary); color: white; border-color: var(--primary); }
    .spin { animation: rotate 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- 設備卡片 --- */
    .device-card {
      height: 140px; border-radius: 20px; cursor: pointer; 
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }
    .col-animate { animation: fadeInUp 0.5s ease backwards; }
    .device-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; transition: 0.3s;
    }
    
    .status-available::before { background: var(--secondary); }
    .status-available { color: #065F46; }
    .status-available .device-info { background: #E6FFFA; color: #00897B; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

    .status-inuse::before { background: var(--danger); }
    .status-inuse { color: #991B1B; }
    .status-inuse .device-info { background: #FEE2E2; color: #991B1B; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

    .status-other::before { background: #9CA3AF; }
    .status-other { color: #4B5563; opacity: 0.7; pointer-events: none; filter: grayscale(100%); }
    .status-other .device-info { background: #F3F4F6; color: #4B5563; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    
    .device-card:hover:not(.status-other) { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 30px rgba(0,0,0,0.08); 
    }
    .selected { 
      border: 2px solid var(--primary) !important; 
      background: #F3F0FF !important;
      transform: translateY(-5px); 
      box-shadow: 0 15px 30px rgba(108, 92, 231, 0.2) !important; 
    }
    .selected::before { background: var(--primary); }
    
    .device-id { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 8px; letter-spacing: 0.5px; }

    /* --- 骨架屏 --- */
    .skeleton-card {
      height: 140px; border-radius: 20px; background: rgba(255,255,255,0.6); 
      border: 1px dashed rgba(0,0,0,0.1); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; padding: 15px; cursor: wait;
    }
    .skeleton-text { border-radius: 8px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* --- 底部懸浮列 --- */
    .bottom-bar { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 20px; border-top: 1px solid rgba(255,255,255,0.5); 
      z-index: 1050; box-shadow: 0 -10px 30px rgba(0,0,0,0.06); 
      transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .bottom-bar.show { transform: translateY(0); }
    
    .btn-action {
      background: linear-gradient(135deg, var(--primary), #8E7CFF); color: white;
      border: none; padding: 12px 30px; font-weight: 800; font-size: 1.15rem;
      border-radius: 50px; box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
      transition: all 0.3s;
    }
    .btn-action:hover { box-shadow: 0 12px 25px rgba(108, 92, 231, 0.4); transform: translateY(-2px); color: white; }

    /* --- 輸入區與狀態 --- */
    .sync-status { display: inline-flex; align-items: center; font-size: 0.85rem; color: #6B7280; gap: 6px; margin-top: 10px; background: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 20px; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--secondary); display: inline-block; }
    .syncing .sync-dot { background: #F59E0B; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    /* 控制面板 */
    .control-panel { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 20px; padding: 20px; margin-bottom: 30px; border: 1px solid var(--glass-border); box-shadow: 0 8px 20px rgba(0,0,0,0.02); display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap; }
    
    .form-select, .form-control { border-radius: 14px; border: 2px solid transparent; padding: 12px 18px; background: #F3F4F6; transition: 0.3s; font-weight: 600; font-size: 1rem; }
    .form-control:focus, .form-select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1); outline: none; }
  </style>
</head>
<body>

<div class="bg-shape1"></div>
<div class="bg-shape2"></div>

<div class="container">
  <div class="header-section">
    <h2>學校平板管理系統</h2>
    <p class="sub-title">請選擇行動車或工作表進行檢視或借還</p>
    
    <div class="btn-group-custom">
      <button id="refresh-btn" class="btn-glass" onclick="loadDevices(true)">
        <i id="btn-icon" class="bi bi-arrow-clockwise"></i>
        <span>重新同步</span>
      </button>
      <button class="btn-glass" onclick="openReportModal()">
        <i class="bi bi-flag"></i>
        <span>故障通報</span>
      </button>
    </div>
    
    <div id="sync-status" class="sync-status" style="display: none;">
      <span class="sync-dot"></span> <span id="sync-text">已更新至最新狀態</span>
    </div>
  </div>

  <!-- 控制面板，可選擇多個工作表 -->
  <div class="control-panel">
      <div class="d-flex align-items-center flex-grow-1" style="min-width: 250px;">
          <i class="bi bi-hdd-stack fs-4 text-primary me-3"></i>
          <div class="flex-grow-1">
             <label class="form-label mb-1 fw-bold text-secondary small">選擇行動車 / 設備群組</label>
             <select id="sheetSelector" class="form-select w-100" onchange="onSheetChange()">
               <option value="行動車1">A車 (行動車1)</option>
               <option value="行動車2">B車 (行動車2)</option>
               <!-- 可依據需求增刪 -->
               <option value="工作表1">備用清單 (工作表1)</option> 
             </select>
          </div>
      </div>
      <div>
         <span class="badge bg-light text-dark px-3 py-2 border shadow-sm rounded-pill fs-6">
           共 <span id="totalCount" class="text-primary fw-bold">0</span> 台
         </span>
      </div>
  </div>
  
  <div id="grid-container" class="row g-4">
    <!-- Cards will go here -->
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="d-flex justify-content-between align-items-center container py-0">
    <span class="fs-4 fw-bold text-dark">已選取 <span id="selectedCount" style="color: var(--primary);">0</span> 台</span>
    <button class="btn-action" onclick="openBatchModal()">
      下一步：批次處理 <i class="bi bi-arrow-right fw-bold ms-1"></i>
    </button>
  </div>
</div>

<div class="modal fade" id="actionModal" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header d-flex justify-content-between border-0 pb-0">
        <h5 class="modal-title fs-4 fw-bold"><span id="modalActionTitle">批量處理</span></h5>
        <button type="button" class="btn-close fs-5" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-3">
        
        <div class="mb-4">
          <label class="form-label" id="teacherLabel"><i class="bi bi-person-fill"></i> 管理教師姓名</label>
          <input type="text" id="teacherName" class="form-control" placeholder="請輸入管理教師姓名">
        </div>

        <div class="mb-4">
          <label class="form-label" id="classLabel"><i class="bi bi-geo-alt-fill"></i> 借用班級或單位</label>
          <input type="text" id="className" class="form-control" placeholder="例如：213班、教務處">
        </div>

        <div class="mb-4">
           <label class="form-label"><i class="bi bi-card-text"></i> 備註事項</label>
           <input type="text" id="note" class="form-control" placeholder="例如：平板車鑰匙已領取...">
        </div>
        
        <div class="mb-2">
          <label class="form-label fw-bold">電子簽名</label>
          <div id="signature-pad-container" style="border: 2px dashed #D1D5DB; border-radius: 16px; height: 180px; position: relative;">
            <button class="btn btn-sm btn-light position-absolute top-0 end-0 m-2 rounded-pill shadow-sm" style="z-index: 10;" onclick="signaturePad.clear()">
              <i class="bi bi-eraser-fill"></i> 重簽
            </button>
            <canvas id="signature-canvas" style="width: 100%; height: 100%; touch-action: none; border-radius: 16px;"></canvas>
          </div>
        </div>

      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-action w-100 py-3" id="submitBtn" onclick="submitBatch()">確認送出</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // GAS Web App 網址 (包含多工作表支援)
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbxKlco2W_J0BQ9O7LVoGtv0I1KTZQxMOCBe0rMm971kyXkjBwpqK0daznB1BFMrTOYI/exec";

  let selectedDevices = [];
  let currentSheet = "行動車1";
  let signaturePad;
  let actionModal;

  window.onload = () => {
    actionModal = new bootstrap.Modal(document.getElementById('actionModal'));
    signaturePad = new SignaturePad(document.getElementById('signature-canvas'), {
        minWidth: 1.5, maxWidth: 3.5, penColor: "#000"
    });
    document.getElementById('actionModal').addEventListener('shown.bs.modal', resizeCanvas);

    currentSheet = document.getElementById('sheetSelector').value;
    loadDevices();     
  };

  function onSheetChange() {
    currentSheet = document.getElementById('sheetSelector').value;
    loadDevices();
  }

  async function callApi(action, data = {}) {
    try {
      const payload = { action: action, sheetName: currentSheet, ...data };
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (e) {
      console.error("API Error:", e);
      Swal.fire('連線錯誤', '無法連接到伺服器', 'error');
      throw e;
    }
  }

  function renderSkeleton() {
    const container = document.getElementById('grid-container');
    let html = '';
    for(let i=0; i<12; i++) {
        html += `
        <div class="col-6 col-md-4 col-lg-3 col-animate" style="animation-delay: ${i*0.05}s">
          <div class="skeleton-card" aria-hidden="true">
             <div class="w-100 text-center">
                <div class="skeleton-text mx-auto mb-3" style="width: 70%; height:32px;"></div>
                <div class="skeleton-text mx-auto" style="width: 50%; height:20px;"></div>
             </div>
          </div>
        </div>`;
    }
    container.innerHTML = html;
  }

  function loadDevices(forceRefresh = false) {
    selectedDevices = [];
    document.getElementById('bottomBar').classList.remove('show');
    
    // 使用 sheetName 作為快取 KEY
    const cacheKey = 'tabletCache_' + currentSheet;
    const cachedData = localStorage.getItem(cacheKey);
    const syncStatus = document.getElementById('sync-status');
    const syncText = document.getElementById('sync-text');
    
    if (cachedData && !forceRefresh) {
        renderGrid(JSON.parse(cachedData));
        syncStatus.style.display = 'inline-flex';
        syncStatus.className = 'sync-status syncing';
        syncText.innerText = "背景同步更新中...";
    } else {
        renderSkeleton();
        document.getElementById('totalCount').innerText = "0";
        syncStatus.style.display = 'none';
    }

    const btnIcon = document.getElementById('btn-icon');
    document.getElementById('refresh-btn').disabled = true;
    btnIcon.classList.add('spin');

    callApi('read').then(res => {
        if(res.status === 'success') {
            const devices = res.data;
            const newDataString = JSON.stringify(devices);
            
            if (newDataString !== cachedData || forceRefresh || !cachedData) {
                localStorage.setItem(cacheKey, newDataString);
                if (selectedDevices.length === 0) {
                  renderGrid(devices);
                }
            }
        } else {
            console.error(res.message);
            if(res.message.includes('找不到工作表')) {
               document.getElementById('grid-container').innerHTML = 
                 `<div class="col-12 text-center text-muted py-5 mt-5 fw-bold fs-5">找不到工作表 "${currentSheet}"，請確認 GAS 試算表中有無此分頁。</div>`;
            }
        }
        
        document.getElementById('refresh-btn').disabled = false;
        btnIcon.classList.remove('spin');
        
        syncStatus.style.display = 'inline-flex';
        syncStatus.className = 'sync-status';
        syncText.innerText = "已更新至最新狀態";
        setTimeout(() => { syncStatus.style.display = 'none'; }, 3000);
    });
  }

  function renderGrid(devices) {
    const container = document.getElementById('grid-container');
    container.innerHTML = ''; 
    document.getElementById('totalCount').innerText = devices.length;

    if (devices.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-5 mt-5 fw-bold fs-5">目前沒有載具資料</div>';
        return;
    }

    devices.forEach((d, i) => {
      // 假設試算表中欄位有：'設備編號', '狀態', '借用人' 等
      // 注意：這裡假設第一列標題分別為 "id", "status", "user"，如果不一樣請根據你的試算表修改！
      // 支援多種常見中文標題，做容錯處理：
      let id = d['設備ID'] || d['設備編號'] || '未知';
      let status = d['設備狀態'] || d['目前狀態'] || '未知';
      let user = d['備註'] || d['借用人'] || '';

      let statusClass = (status === '可借用') ? 'status-available' : (status === '送修中' || status === '報廢' || status === '其他' ? 'status-other' : 'status-inuse');
      let displayInfo = (status === '可借用') ? '可借用' : (status === '送修中' || status === '報廢' || status === '其他' ? '維修/不可借' : (user || '借出中'));
      
      let isSelected = selectedDevices.some(sd => sd.id === id);
      let selectedClass = isSelected ? 'selected' : '';

      container.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3 col-animate" style="animation-delay: ${i*0.02}s">
          <div class="device-card ${statusClass} ${selectedClass}" id="card-${id}" onclick="toggleSelect('${id}', '${status}', '${user}')">
            <div class="device-id">${id}</div>
            <div class="device-info text-truncate" style="max-width: 85%;">${displayInfo}</div>
          </div>
        </div>`;
    });
  }

  function toggleSelect(id, status, user) {
    if (status === '送修中' || status === '報廢' || status === '其他') {
      Swal.fire({ icon: 'error', title: '無法選取', text: '此設備目前維修中或不可借用。', timer: 2000, showConfirmButton: false });
      return;
    }
    
    if (selectedDevices.length > 0 && selectedDevices[0].status !== status) {
        const idx = selectedDevices.findIndex(d => d.id === id);
        if (idx === -1) {
            Swal.fire({ icon: 'warning', title: '狀態衝突', text: '不可同時選取「可借用」與「外借中」的設備！' });
            return;
        }
    }
    
    const card = document.getElementById('card-' + id);
    const index = selectedDevices.findIndex(d => d.id === id);
    if (index > -1) {
      selectedDevices.splice(index, 1);
      card.classList.remove('selected');
    } else {
      selectedDevices.push({id, status, user});
      card.classList.add('selected');
    }
    
    const bottomBar = document.getElementById('bottomBar');
    if (selectedDevices.length > 0) {
      bottomBar.classList.add('show');
    } else {
      bottomBar.classList.remove('show');
    }
    document.getElementById('selectedCount').innerText = selectedDevices.length;
  }

  function resizeCanvas() {
    const canvas = document.getElementById('signature-canvas');
    const container = document.getElementById('signature-pad-container');
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = container.offsetWidth * ratio;
    canvas.height = container.offsetHeight * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
    signaturePad.clear();
  }

  function openBatchModal() {
    if (selectedDevices.length === 0) return;
    
    const type = (selectedDevices[0].status === '可借用') ? '借出' : '歸還';
    document.getElementById('modalActionTitle').innerText = `${type}確認 (${selectedDevices.length}台)`;
    
    if (type === '歸還') {
      document.getElementById('teacherLabel').innerHTML = '<i class="bi bi-person-fill"></i> 歸還教師姓名';
      // 預設填入第一台設備的當時借用人(備註)，方便歸還
      document.getElementById('teacherName').value = selectedDevices[0].user;
      document.getElementById('className').value = "";
    } else {
      document.getElementById('teacherLabel').innerHTML = '<i class="bi bi-person-fill"></i> 借用教師姓名';
      document.getElementById('teacherName').value = "";
      document.getElementById('className').value = "";
    }
    actionModal.show();
  }
  
  function submitBatch() {
    const teacherName = document.getElementById('teacherName').value.trim();
    const className = document.getElementById('className').value.trim();
    const note = document.getElementById('note').value.trim();

    if (!teacherName || signaturePad.isEmpty()) {
      Swal.fire({ icon: 'warning', title: '資料未齊全', text: '請確實填寫「管理教師」並完成電子簽名！' });
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; 
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>處理中...';

    const actionType = (selectedDevices[0].status === '可借用') ? '借出' : '歸還';
    
    // 你先前的 API 需要接收 data 包裝的結構寫入 Sheet，或者我們可以透過 processTransaction 邏輯
    // 這裡我們組裝 Payload，因為你的 Apps Script 目前設定的是寫入 `write` 新增一筆記錄
    const payload = {
      deviceIds: selectedDevices.map(d => d.id).join(", "),
      actionType: actionType,
      teacher: teacherName,
      location: className,
      note: note,
      signature: signaturePad.toDataURL()
    };

    callApi('write', payload).then(res => {
        if(res.status === 'success'){
            Swal.fire({
              icon: 'success', title: '處理完成！', 
              text: `已成功紀錄 ${actionType} 操作。`, 
              confirmButtonColor: '#6C5CE7'
            });
            actionModal.hide();
            loadDevices(true); // 強制更新抓最新列表以反映最新狀態
        } else {
            Swal.fire('處理失敗', res.message, 'error');
        }
    }).catch(err => {
        Swal.fire('發生錯誤', '發生非預期的錯誤或網路斷線', 'error');
    }).finally(() => {
        btn.disabled = false; btn.innerText = "確認送出";
    });
  }

  function openReportModal() {
    Swal.fire({
       title: '功能建置中',
       text: '這可以獨立出一個表單，讓學生或老師回報某台平板無法開機或螢幕破裂等...',
       icon: 'info',
       confirmButtonColor: '#6C5CE7'
    });
  }

</script>
